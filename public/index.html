<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-MAt(hematics)</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; text-align: center; }
        #game-container { display: none; margin-top: 20px; }
        #canvas-wrapper { border: 2px solid #555; background: #fff; margin: 20px auto; width: 600px; height: 400px; }
        .hp-bar { height: 20px; background: green; transition: width 0.3s; }
        .player-info { margin: 10px; padding: 10px; border: 1px solid #444; border-radius: 8px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #options-container button { margin: 5px; }
    </style>
</head>
<body>
    <h1>U-MAt(hematics)</h1>

    <div id="lobby">
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <br><br>
        <button onclick="createRoom()">Oda Oluştur</button>
        <br><br>
        <input type="text" id="roomIdInput" placeholder="Oda Kodu">
        <button onclick="joinRoom()">Katıl</button>
    </div>

    <div id="game-container">
        <h2 id="room-code-display"></h2>
        <div id="players-list"></div>
        <button id="start-game-btn" onclick="startGame()" style="display:none;">Oyunu Başlat</button>

        <div id="question-area" style="display:none;">
            <h3>Soru: <span id="question-text"></span></h3>
            <img id="card-img" style="max-width: 150px; display: block; margin: 10px auto; border-radius: 8px;">
            <img id="question-img" style="max-width: 100%; display: block; margin: 10px auto;">
            <div id="options-container"></div>
            <p>Puan: <span id="question-value"></span></p>
        </div>

        <div id="canvas-wrapper">
            <canvas id="solver-canvas" width="600" height="400"></canvas>
        </div>
        <button onclick="clearCanvas()">Çizimi Temizle</button>
    </div>

    <script>
        const socket = io();
        let currentRoomId = null;
        let canvas;

        window.onload = () => {
            canvas = new fabric.Canvas('solver-canvas', {
                isDrawingMode: true,
                freeDrawingBrush: new fabric.PencilBrush(canvas)
            });
            canvas.freeDrawingBrush.width = 2;
            canvas.freeDrawingBrush.color = '#000';
        };

        function createRoom() {
            const username = document.getElementById('username').value;
            if (username) socket.emit('createRoom', username);
        }

        function joinRoom() {
            const username = document.getElementById('username').value;
            const roomId = document.getElementById('roomIdInput').value;
            if (username && roomId) socket.emit('joinRoom', { roomId, username });
        }

        function startGame() {
            socket.emit('startGame', currentRoomId);
        }

        function clearCanvas() {
            canvas.clear();
            canvas.backgroundColor = '#fff';
            canvas.renderAll();
        }

        socket.on('roomCreated', (room) => {
            currentRoomId = room.id;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('room-code-display').innerText = `Oda: ${room.id}`;
            document.getElementById('start-game-btn').style.display = 'inline-block';
            updatePlayers(room.players);
        });

        socket.on('roomJoined', (room) => {
            currentRoomId = room.id;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('room-code-display').innerText = `Oda: ${room.id}`;
            document.getElementById('start-game-btn').style.display = 'none';
            updatePlayers(room.players);
        });

        socket.on('roomUpdated', (room) => {
            currentRoomId = room.id;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('room-code-display').innerText = `Oda: ${room.id}`;
            updatePlayers(room.players);
        });

        socket.on('gameStarted', () => {
            document.getElementById('start-game-btn').style.display = 'none';
            document.getElementById('question-area').style.display = 'block';
        });

        socket.on('newQuestion', (q) => {
            document.getElementById('question-text').innerText = q.id;
            document.getElementById('question-value').innerText = q.value;
            document.getElementById('question-img').src = q.questionImage;
            document.getElementById('card-img').src = q.cardImage;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            ['a', 'b', 'c', 'd'].forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = `${opt.toUpperCase()}: ${q[opt]}`;
                btn.onclick = () => submitAnswer(opt);
                container.appendChild(btn);
            });
        });

        function submitAnswer(answer) {
            socket.emit('submitAnswer', { roomId: currentRoomId, answer });
        }

        socket.on('feedback', (msg) => { alert(msg); });

        function updatePlayers(players) {
            const list = document.getElementById('players-list');
            list.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player-info';
                div.innerHTML = `
                    <strong>${p.username}</strong>
                    <div style="background:#555; width:100%; height:20px;">
                        <div class="hp-bar" style="width: ${(p.hp / 200) * 100}%;"></div>
                    </div>
                    <span>HP: ${p.hp}</span>
                `;
                list.appendChild(div);
            });
        }

        socket.on('gameOver', (data) => {
            alert(`Oyun Bitti! Kaybeden: ${data.loser}`);
            location.reload();
        });

        socket.on('error', (msg) => { alert(msg); });
    </script>
</body>
</html>
