<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="U-MAt(hematics) — Matematik temalı çok oyunculu online kart oyunu">
    <title>U-MAt(hematics)</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <h1>U-MAt(hematics)</h1>
            <p class="subtitle">Matematik Kart Savaşı</p>
        </header>

        <!-- Lobby -->
        <div id="lobby" class="glass-panel">
            <h2>Oyuna Katıl</h2>
            <div class="input-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="username" class="input-field" placeholder="İsmini yaz..." maxlength="20">
            </div>
            <button class="btn btn-primary" onclick="createRoom()">Oda Oluştur</button>
            <div class="divider">veya</div>
            <div class="join-row">
                <input type="text" id="roomIdInput" class="input-field" placeholder="Oda Kodu" maxlength="6">
                <button class="btn btn-secondary" onclick="joinRoom()">Katıl</button>
            </div>
        </div>

        <!-- Game -->
        <div id="game-container">
            <div class="top-bar glass-panel">
                <div class="room-code" id="room-code"></div>
                <div class="turn-indicator" id="turn-text"></div>
                <button id="start-game-btn" class="btn btn-primary btn-small" onclick="startGame()"
                    style="display:none">Oyunu Başlat</button>
                <button id="mute-btn" class="btn btn-secondary btn-small" onclick="toggleMute()" title="Ses">🔊</button>
            </div>

            <div id="top-card-indicator" class="top-card-indicator glass-panel" style="display:none"></div>

            <div id="players-grid" class="players-grid"></div>

            <div id="waiting-area" class="glass-panel waiting-overlay">
                <h2>Oyuncular Bekleniyor...</h2>
                <p>Host oyunu başlatacak</p>
            </div>

            <!-- Question -->
            <div id="question-panel" class="glass-panel question-panel">
                <div class="question-header">
                    <h3>Soru</h3>
                    <div class="question-meta">
                        <span id="q-type-badge" class="badge badge-normal">normal</span>
                        <span id="q-difficulty-badge" class="badge badge-medium">Orta</span>
                        <span id="q-value" class="question-value">0 hasar</span>
                    </div>
                </div>
                <p class="played-by-info" id="q-played-by"></p>
                <div class="timer-bar-container">
                    <div class="timer-bar" id="timer-bar"></div>
                </div>
                <div class="question-images">
                    <img id="q-card-img" class="card-image" alt="Kart">
                    <img id="q-question-img" class="question-image" alt="Soru">
                </div>
                <div id="options-grid" class="options-grid"></div>
            </div>

            <!-- Hand -->
            <div class="hand-panel glass-panel">
                <div class="hand-header">
                    <h3>Elin</h3>
                    <button id="draw-card-btn" class="btn btn-secondary btn-small" onclick="drawCard()"
                        style="display:none">🃏 Havuzdan Çek</button>
                </div>
                <div id="hand-cards" class="hand-cards"></div>
            </div>

            <!-- Drawing Canvas -->
            <div class="canvas-panel glass-panel">
                <div class="canvas-toolbar">
                    <label>Kalem:</label>
                    <input type="color" id="draw-color" class="color-picker" value="#000000"
                        onchange="onColorChange(event)">
                    <label>Boyut:</label>
                    <input type="range" id="brush-range" class="brush-size" min="1" max="20" value="2"
                        oninput="onBrushSize(event)">
                    <button class="btn btn-small btn-secondary" onclick="toggleEraser()">Silgi</button>
                    <button class="btn btn-small btn-secondary" onclick="clearCanvas()">Temizle</button>
                </div>
                <div class="canvas-wrapper">
                    <canvas id="solver-canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-overlay" class="game-over-overlay">
        <div class="game-over-panel glass-panel">
            <h2>Oyun Bitti!</h2>
            <div id="winner-name" class="winner-name"></div>
            <div id="eliminated-list" class="eliminated-list"></div>
            <button class="btn btn-primary" onclick="returnToLobby()">Lobiye Dön</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="/sounds.js"></script>
    <script src="/game.js"></script>
</body>

</html>
